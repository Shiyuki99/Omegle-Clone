<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Chat</title>
    <style>
        :root {
            --bg: #090c14;
            --panel: #0d1422;
            --panel-2: #0b101d;
            --line: #2b3247;
            --text: #eaf0ff;
            --muted: #aab3cb;
            --accent: #6dd6ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 1.2vh 1.2vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background:
                radial-gradient(1200px 500px at 80% -10%, #1a2748 0%, rgba(26, 39, 72, 0) 70%),
                linear-gradient(180deg, #090c14 0%, #080c16 100%);
            color: var(--text);
        }

        h1 {
            margin: 0;
            width: 96vw;
            max-width: 1500px;
            font-size: clamp(20px, 2.2vw, 32px);
            letter-spacing: 0.02em;
        }

        .stage {
            width: 96vw;
            max-width: 1500px;
            height: 84vh;
            display: grid;
            grid-template-columns: 26% 1fr;
            gap: 1.1vw;
        }

        .side {
            display: grid;
            grid-template-rows: 34% 1fr;
            gap: 1.1vh;
            min-height: 0;
        }

        .videoContainer,
        .chatCard {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 10px 24px rgba(0, 0, 0, 0.35);
        }

        .videoContainer {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        #remoteContainer {
            width: 100%;
            height: 100%;
            aspect-ratio: 16 / 9;
        }

        .videoContainer video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #02050d;
        }

        .placeholder {
            position: absolute;
            z-index: 2;
            pointer-events: none;
            text-align: center;
            color: var(--muted);
            font-size: clamp(13px, 1.2vw, 18px);
        }

        #remoteContainer .placeholder {
            font-size: clamp(24px, 4.4vw, 72px);
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        #remoteContainer.waiting .placeholder {
            animation: waitingPulse 1.6s ease-in-out infinite;
        }

        @keyframes waitingPulse {
            0% { opacity: 0.55; transform: scale(0.995); }
            50% { opacity: 1; transform: scale(1.01); }
            100% { opacity: 0.55; transform: scale(0.995); }
        }

        .videoContainer.has-stream .placeholder {
            display: none;
        }

        .chatCard {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 0;
            padding: 0.9rem;
            gap: 0.65rem;
        }

        .chatTitle {
            margin: 0;
            font-size: 1rem;
            color: #d4dcf0;
            text-transform: lowercase;
            letter-spacing: 0.06em;
            text-align: center;
        }

        .chatLog {
            border: 1px dashed var(--line);
            border-radius: 10px;
            padding: 0.7rem;
            color: var(--muted);
            overflow: auto;
            font-size: 0.92rem;
        }

        .chatInputRow {
            display: grid;
            grid-template-columns: 1fr 76px;
            gap: 0.55rem;
        }

        #chatInput {
            width: 100%;
            min-width: 0;
            background: #0a1322;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 0.58rem 0.72rem;
        }

        #sendMsgBtn {
            padding: 0.42rem 0.62rem;
            border-radius: 9px;
            border: 1px solid var(--line);
            background: #122039;
            color: var(--text);
            cursor: not-allowed;
            opacity: 0.55;
        }

        .controls {
            width: 96vw;
            max-width: 1500px;
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding-bottom: 0.35rem;
        }

        button {
            min-width: clamp(140px, 18vw, 260px);
            padding: 0.7rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--line);
            cursor: pointer;
            background: linear-gradient(180deg, #1d3658 0%, #13243d 100%);
            color: #eaf0ff;
            font-weight: 600;
        }

        button.secondary {
            background: linear-gradient(180deg, #3a1f2c 0%, #2b1520 100%);
        }

        @media (max-width: 980px) {
            .stage {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                height: 84vh;
            }

            .side {
                grid-template-rows: 28vh 26vh;
            }
        }

        /* Error modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 60;
        }

        .modal {
            background: linear-gradient(180deg, #0b1220, #071421);
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 6px 30px rgba(2, 6, 23, 0.7);
            color: #e6eef8;
            width: 320px;
            text-align: center;
        }

        .modal h3 {
            margin: 0 0 8px 0;
        }

        .modal p {
            margin: 0 0 12px 0;
            color: #a9c0d9;
        }

        .modal button {
            width: 100%;
        }
    </style>
</head>

<body>

    <h1>WebRTC Chat</h1>

    <div class="stage">
        <div class="side">
            <div id="localContainer" class="videoContainer">
                <div class="placeholder">User Camera</div>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>

            <section class="chatCard" aria-label="chat panel">
                <h2 class="chatTitle">chat</h2>
                <div class="chatLog" id="chatLog">Messaging feature is not available yet.</div>
                <div class="chatInputRow">
                    <input id="chatInput" type="text" placeholder="Type message..." />
                    <button id="sendMsgBtn" type="button" disabled>Send</button>
                </div>
            </section>
        </div>

        <div id="remoteContainer" class="videoContainer waiting">
            <div class="placeholder">Looking for people...</div>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">Start Chat</button>
        <button id="disconnectBtn" class="secondary">Disconnect</button>
    </div>

    <div id="errorModal" class="modal-backdrop">
        <div class="modal">
            <h3>Something went wrong</h3>
            <p id="errorText">An unexpected error occurred.</p>
            <button id="errorOk">OK</button>
        </div>
    </div>


    <script type="module" src="./app.js"></script>

</body>

</html>
